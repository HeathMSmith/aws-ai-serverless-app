<!DOCTYPE html>
<html>
<head>
  <title>Ask Me Anything (Within Reason)</title>
  <meta charset="UTF-8">

  <style>
    :root {
      --bg: #f5f7fa;
      --card: white;
      --text: #111;
      --subtext: #666;
      --accent: #2563eb;
      --border: #ddd;
    }

    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --subtext: #94a3b8;
      --border: #334155;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      margin: 0;
      padding: 0;
      color: var(--text);

      display: flex;
      justify-content: center;
      align-items: flex-end;

      min-height: 100vh;
      padding-bottom: 6vh;

      background:
        linear-gradient(rgba(15, 23, 42, 0.55), rgba(15, 23, 42, 0.55)),
        url("assets/maine-bg.png");

      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .container {
      width: 85%;
      max-width: 1100px;

      background: rgba(255, 255, 255, 0.92);
      padding: 25px;
      border-radius: 14px;
      backdrop-filter: blur(6px);

      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    body.dark .container {
      background: rgba(30, 41, 59, 0.85);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-image {
      max-width: 575px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      margin-bottom: 10px;
    }

    .toggle {
      cursor: pointer;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      background: var(--border);
    }

    textarea {
      width: 100%;
      height: 140px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-top: 15px;
      background: transparent;
      color: var(--text);
      resize: none;
    }

    button {
      margin-top: 12px;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .response-box {
      background: var(--bg);
      border-radius: 10px;
      padding: 15px;
      min-height: 140px;
      position: relative;
      white-space: pre-wrap;
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .spinner {
      margin-top: 10px;
      display: none;
      font-size: 14px;
    }

    .history {
      margin-top: 20px;
    }

    .history h3 {
      margin-bottom: 10px;
    }

    .history-item {
      padding: 10px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      cursor: pointer;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: var(--subtext);
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      body {
        align-items: flex-start;
        padding-top: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="top-bar">
      <img src="assets/header-image.png" alt="App Header" class="header-image">
      <div class="toggle" onclick="toggleDarkMode()">Light/Dark</div>
    </div>

    <div class="main-grid">

      <!-- INPUT -->
      <div>
        <textarea id="input" placeholder="Enter your prompt..."></textarea>
        <button onclick="sendRequest()">Generate</button>
        <div class="spinner" id="spinner">Thinking...</div>
      </div>

      <!-- RESPONSE -->
      <div class="response-box" id="response">
        <span class="copy-btn" onclick="copyResponse()">Copy</span>
        Your response will appear here...
      </div>

    </div>

    <!-- HISTORY -->
    <div class="history" id="history"></div>

    <div class="footer">
      Powered by: API Gateway • Lambda • Bedrock • DynamoDB
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
